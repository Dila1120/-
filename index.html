<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учусь.РФ - Онлайн курсы</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="assets/images/logo.png" alt="Учусь.РФ" class="logo-img">
            <span>Учусь.РФ</span>
        </div>
        <button class="burger-menu" id="burger-menu" aria-label="Меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="nav-menu" id="nav-menu">
            <a href="assets/login.html" class="btn-outline btn-header">Вход</a>
            <a href="assets/register.html" class="btn btn-header">Регистрация</a>
        </nav>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Записи на онлайн курсы</h1>
            <p>Повышение квалификации, переподготовка, охрана труда — дистанционное обучение для профессионалов</p>
            
            <div class="hero-slider">
                <div class="slider-wrapper" id="slider-wrapper">
                    <div class="slide"><img src="assets/images/1.jpg" alt="Повышение квалификации"></div>
                    <div class="slide"><img src="assets/images/2.jpg" alt="Курс переподготовки"></div>
                    <div class="slide"><img src="assets/images/3.jpg" alt="Охрана труда"></div>
                    <div class="slide"><img src="assets/images/4.jpg" alt="Сертификаты"></div>
                </div>
                <button class="slider-btn prev" id="slider-prev">‹</button>
                <button class="slider-btn next" id="slider-next">›</button>
                <div class="slider-dots" id="slider-dots"></div>
            </div>

            <div class="hero-buttons">
                <a href="assets/login.html" class="btn">Войти в систему</a>
                <a href="assets/register.html" class="btn-outline">Зарегистрироваться</a>
            </div>

            <div class="contact-block">
                <p><strong>Адрес:</strong> г. Москва, ул. Большая Ордынка, д. 15</p>
                <p><strong>Телефон:</strong> +7 (495) 123-45-67</p>
                <p class="contact-note">Ответим оперативно и подробно</p>
            </div>
        </div>
    </section>

    <script src="assets/main.js"></script>
</body>
</html>
