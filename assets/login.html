<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Учусь.РФ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h2 style="color: var(--dark-primary);">🔐 Авторизация</h2>
        <form id="login-form">
            <label>Ваш логин</label>
            <input type="text" id="login-username" placeholder="Введите логин" required>
            <label>Ваш пароль</label>
            <input type="password" id="login-password" placeholder="Введите пароль" required>
            <div id="login-error" class="error-msg"></div>
            <button type="submit" class="btn" style="width:100%; margin-top:10px;">Войти</button>
            <p class="link-text">Еще не зарегистрированы? <a href="register.html">Регистрация</a></p>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
