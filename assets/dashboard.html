<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - Учусь.РФ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header-flex">
            <h3>👤 Личный кабинет</h3>
            <button class="btn-outline btn-sm" onclick="logout()">Выйти</button>
        </div>

        <!-- Слайдер в кабинете -->
        <div class="hero-slider" style="max-width:100%; height:180px; margin-bottom:20px;">
            <div class="slider-wrapper" id="slider-wrapper-dash">
                <div class="slide"><img src="images/1.jpg" alt="Курсы"></div>
                <div class="slide"><img src="images/2.jpg" alt="Переподготовка"></div>
                <div class="slide"><img src="images/3.jpg" alt="Охрана труда"></div>
                <div class="slide"><img src="images/4.jpg" alt="Сертификаты"></div>
            </div>
        </div>

        <button class="btn" onclick="window.location.href='application.html'" style="width:100%;">➕ Подать заявку на курс</button>

        <h3 style="margin-top: 28px; color: var(--dark-primary);">📋 Мои заявки</h3>
        <div id="history-list"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
