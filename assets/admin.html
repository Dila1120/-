<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - Учусь.РФ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/logo.png" type="image/x-icon">
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="Учусь.РФ" class="logo-img">
            <span>Учусь.РФ</span>
            
        </div>
        <button class="burger-menu" id="burger-menu" aria-label="Меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="nav-menu" id="nav-menu">
            <button class="btn-outline btn-sm" onclick="logout()">Выход</button>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h2 style="color: var(--dark-primary); margin-bottom:20px;">Управление заявками</h2>
            <div class="filter-bar">
                <select id="status-filter">
                    <option value="all">Все заявки</option>
                    <option value="Новая">Новые</option>
                    <option value="Идет обучение">В процессе</option>
                    <option value="Обучение завершено">Завершены</option>
                </select>
                <select id="sort-filter">
                    <option value="date-desc">По дате (сначала новые)</option>
                    <option value="date-asc">По дате (сначала старые)</option>
                    <option value="status">По статусу</option>
                    <option value="course">По курсу</option>
                </select>
                <button class="btn btn-sm" onclick="renderAdminApps(1)" style="padding:8px 20px;">Применить</button>
                <button class="btn-outline btn-sm" onclick="resetFilter()" style="padding:8px 20px;">Сбросить</button>
            </div>
            <div id="admin-app-list"></div>
            <div class="pagination">
                <button id="prev-page" onclick="changePage(-1)">Назад</button>
                <span id="page-info">Страница 1 из 1</span>
                <button id="next-page" onclick="changePage(1)">Вперед</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Редактирование заявки</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <label>Курс</label>
                <select id="edit-course">
                    <option value="Повышение квалификации">Повышение квалификации</option>
                    <option value="Курс переподготовки">Курс переподготовки</option>
                    <option value="Охрана труда">Охрана труда</option>
                </select>
                <label>Дата (ДД.ММ.ГГГГ)</label>
                <input type="text" id="edit-date" placeholder="Например: 15.06.2026">
                <label>Способ оплаты</label>
                <select id="edit-payment">
                    <option value="Предоплата по QR-коду">Предоплата по QR-коду</option>
                    <option value="Оплата картой МИР">Оплата картой МИР</option>
                    <option value="Постоплата в офисе">Постоплата в офисе (г. Москва)</option>
                </select>
                <label>Статус</label>
                <select id="edit-status">
                    <option value="Новая">Новая</option>
                    <option value="Идет обучение">В процессе</option>
                    <option value="Обучение завершено">Завершено</option>
                </select>
                <div class="modal-actions">
                    <button type="submit" class="btn">Сохранить</button>
                    <button type="button" class="btn-outline" onclick="closeModal()">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
