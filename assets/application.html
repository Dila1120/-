<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка - Учусь.РФ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <button class="btn-outline btn-sm" onclick="window.location.href='dashboard.html'">← Назад</button>
        <h2 style="margin-top:12px; color: var(--dark-primary);">📝 Новая заявка</h2>
        <form id="app-form">
            <label>Выберите курс</label>
            <select id="app-course">
                <option value="Повышение квалификации">Повышение квалификации</option>
                <option value="Курс переподготовки">Курс переподготовки</option>
                <option value="Охрана труда">Охрана труда</option>
            </select>
            
            <label>Дата начала (ДД.ММ.ГГГГ)</label>
            <input type="text" id="app-date" placeholder="Например: 15.06.2026" required>
            
            <label>Способ оплаты</label>
            <select id="app-payment">
                <option value="Предоплата по QR-коду">Предоплата по QR-коду</option>
                <option value="Оплата картой МИР">Оплата картой МИР</option>
                <option value="Постоплата в офисе">Постоплата в офисе (г. Москва)</option>
            </select>
            
            <button type="submit" class="btn" style="width:100%; margin-top:16px;">Отправить заявку</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
