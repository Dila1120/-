<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Учусь.РФ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/images/logo.png" type="image/x-icon">
</head>
<body>
    <div class="app-container">
        <div class="auth-logo">
            <img src="images/logo.png" alt="Учусь.РФ" class="auth-logo-img">
            <h2>Регистрация</h2>
        </div>
        <form id="register-form">
            <label>Логин (латиница + цифры, от 6 символов)</label>
            <input type="text" id="reg-login" placeholder="Например: student123" required>
            <div id="reg-login-error" class="error-msg"></div>
            
            <label>Пароль (минимум 8 символов)</label>
            <input type="password" id="reg-password" placeholder="Введите пароль" required>
            <div id="reg-pass-error" class="error-msg"></div>
            
            <label>Ваше ФИО</label>
            <input type="text" id="reg-fio" placeholder="Иванов Иван Иванович" required>
            
            <label>Телефон</label>
            <input type="tel" id="reg-phone" placeholder="+7 (999) 000-00-00" required>
            
            <label>E-mail</label>
            <input type="email" id="reg-email" placeholder="mail@example.com" required>
            
            <button type="submit" class="btn" style="width:100%; margin-top:10px;">Зарегистрироваться</button>
            <p class="link-text">Уже есть аккаунт? <a href="login.html">Войти</a></p>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
